<main class="tenant-list-container">
  <div class="page-header">
    <h1>{{ 'tenants.list.title' | translate }}</h1>
    <a routerLink="/tenants/new" class="btn btn-primary">
      {{ 'tenants.list.add' | translate }}
    </a>
  </div>

  <app-pro-table
    [columns]="columns"
    [data]="tenants()"
    [sortOptions]="sortOptions"
    [pagination]="{ pageSize: pageSize(), pageNumber: pageNumber(), totalItems: totalItems() }"
    (sortChange)="onSortChange($event)"
    (paginationChange)="onPaginationChange($event)"
  >
  </app-pro-table>
</main>
