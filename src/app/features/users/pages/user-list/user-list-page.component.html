<main class="user-list-container">
  <app-pro-table
    [columns]="columns"
    [data]="users()"
    [sortOptions]="sortOptions"
    [pagination]="{ pageSize: pageSize(), pageNumber: pageNumber(), totalItems: totalItems() }"
    [showDirtyIndicator]="true"
    [filterForm]="filterForm"
    [titleKey]="'users.list.title'"
    [addLink]="'/users/new'"
    [addLabelKey]="'users.list.add'"
    (sortChange)="onSortChange($event)"
    (paginationChange)="onPaginationChange($event)"
    (rowClick)="onRowClick($event)"
    (editClick)="onEditClick($event)"
    (deleteClick)="deleteUser($event.id)"
    (filterApply)="onFilterChange()"
  >
    <div filters>
      <div class="filter-row">
        <app-text-input
          labelKey="users.list.filter.username"
          placeholderKey="users.list.filter.usernamePlaceholder"
          [control]="usernameControl"
          [showDirtyIndicator]="true"
        />
      </div>
    </div>
  </app-pro-table>
</main>
