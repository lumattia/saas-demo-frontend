<main class="dress-form-container">
  <h1>{{ (id ? 'dresses.edit' : 'dresses.new') | translate }}</h1>

  <form (ngSubmit)="save()" class="dress-form">
    <app-text-input
      labelKey="dresses.form.title"
      placeholderKey="dresses.form.titlePlaceholder"
      [control]="getControl('title')"
      [readonly]="!isEditMode"
    />

    <app-text-input
      labelKey="dresses.form.sku"
      placeholderKey="dresses.form.skuPlaceholder"
      [control]="getControl('sku')"
      [readonly]="!isEditMode"
    />

    <app-text-input
      labelKey="dresses.form.size"
      placeholderKey="dresses.form.sizePlaceholder"
      [control]="getControl('size')"
      [readonly]="!isEditMode"
    />

    <app-color-input
      labelKey="dresses.form.color"
      [control]="getControl('color')"
      [readonly]="!isEditMode"
    />

    <app-number-input
      labelKey="dresses.form.price"
      placeholderKey="dresses.form.pricePlaceholder"
      [control]="getControl('price')"
      [decimalPlaces]="2"
      unit="€"
      [readonly]="!isEditMode"
    />

    <div class="actions">
      @if (!isEditMode && id) {
        <app-button
          type="button"
          variant="primary"
          (click)="enableEditMode()">
          {{ 'shared.table.edit' | translate }}
        </app-button>
      }
      @if (isEditMode) {
        <app-button
          type="submit"
          variant="primary">
          {{ 'dresses.form.save' | translate }}
        </app-button>
        <app-button
          type="button"
          variant="secondary"
          (click)="cancelEdit()">
          {{ 'dresses.form.cancel' | translate }}
        </app-button>
      }
    </div>
  </form>
</main>
