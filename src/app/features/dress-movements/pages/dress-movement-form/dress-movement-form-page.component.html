<main class="inventory-form-container">
  <h1>{{ (id ? 'inventory.edit' : 'inventory.new') | translate }}</h1>

  <form (ngSubmit)="save()" class="inventory-form">
    <app-select-input
      labelKey="inventory.form.dress"
      placeholderKey="inventory.form.dressPlaceholder"
      [options]="dresses"
      [control]="dressIdControl"
      [required]="true"
      [disabled]="!!id"
    />

    <app-number-input
      labelKey="inventory.form.quantity"
      placeholderKey="inventory.form.quantityPlaceholder"
      [control]="quantityControl"
      [decimalPlaces]="0"
      [required]="true"
      [min]="1"
    />

    <div class="actions">
      <button type="submit" class="btn btn-primary">
        {{ 'inventory.form.save' | translate }}
      </button>
      @if (id) {
        <button type="button" class="btn btn-danger" (click)="delete()">
          {{ 'inventory.form.delete' | translate }}
        </button>
      }
      <button type="button" class="btn" (click)="exit()">
        {{ 'inventory.form.cancel' | translate }}
      </button>
    </div>
  </form>
</main>
