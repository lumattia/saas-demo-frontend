<main class="dress-movements-form-container">
  <h1>{{ (id ? 'dress-movements.edit' : 'dress-movements.new') | translate }}</h1>

  <form (ngSubmit)="save()" class="dress-movements-form">
    <app-select-input
      labelKey="dress-movements.form.dress"
      placeholderKey="dress-movements.form.dressPlaceholder"
      [options]="dresses"
      [control]="dressIdControl"
      [required]="true"
      [readonly]="!isEditMode"
    />

    <app-number-input
      labelKey="dress-movements.form.quantity"
      placeholderKey="dress-movements.form.quantityPlaceholder"
      [control]="quantityControl"
      [decimalPlaces]="0"
      [required]="true"
      [min]="1"
      [readonly]="!isEditMode"
    />

    <div class="actions">
      @if (!isEditMode && id) {
        <app-button
          type="button"
          variant="primary"
          (click)="enableEditMode()">
          {{ 'shared.table.edit' | translate }}
        </app-button>
      }
      @if (isEditMode) {
        <app-button
          type="submit"
          variant="primary">
          {{ 'dress-movements.form.save' | translate }}
        </app-button>
        <app-button
          type="button"
          variant="secondary"
          (click)="cancelEdit()">
          {{ 'dress-movements.form.cancel' | translate }}
        </app-button>
      }
    </div>
  </form>
</main>
