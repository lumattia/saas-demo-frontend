<main class="dress-movements-list-container">
  <app-pro-table
    [columns]="columns"
    [data]="dressMovement()"
    [sortOptions]="sortOptions"
    [pagination]="{ pageSize: pageSize(), pageNumber: pageNumber(), totalItems: totalItems() }"
    [showDirtyIndicator]="true"
    [filterForm]="filterForm"
    [titleKey]="'dress-movements.list.title'"
    [addLink]="'/dress-movements/new'"
    [addLabelKey]="'dress-movements.list.add'"
    (sortChange)="onSortChange($event)"
    (paginationChange)="onPaginationChange($event)"
    (rowClick)="onRowClick($event)"
    (editClick)="onEditClick($event)"
    (deleteClick)="deleteItem($event.id)"
    (filterApply)="onFilterChange()"
  >
    <div filters>
      <div class="filter-row">
        <app-text-input
          labelKey="dress-movements.list.filter.title"
          placeholderKey="dress-movements.list.filter.titlePlaceholder"
          [control]="dressTitleControl"
          [showDirtyIndicator]="true"
        />
        <app-text-input
          labelKey="dress-movements.list.filter.sku"
          placeholderKey="dress-movements.list.filter.skuPlaceholder"
          [control]="skuControl"
          [showDirtyIndicator]="true"
        />
        <app-text-input
          labelKey="dress-movements.list.filter.size"
          placeholderKey="dress-movements.list.filter.sizePlaceholder"
          [control]="sizeControl"
          [showDirtyIndicator]="true"
        />
        <app-text-input
          labelKey="dress-movements.list.filter.color"
          placeholderKey="dress-movements.list.filter.colorPlaceholder"
          [control]="colorControl"
          [showDirtyIndicator]="true"
        />
        <app-text-input
          labelKey="dress-movements.list.filter.minQuantity"
          placeholderKey="dress-movements.list.filter.minQuantityPlaceholder"
          [control]="minQuantityControl"
          [showDirtyIndicator]="true"
        />
        <app-text-input
          labelKey="dress-movements.list.filter.maxQuantity"
          placeholderKey="dress-movements.list.filter.maxQuantityPlaceholder"
          [control]="maxQuantityControl"
          [showDirtyIndicator]="true"
        />
      </div>
    </div>
  </app-pro-table>
</main>
