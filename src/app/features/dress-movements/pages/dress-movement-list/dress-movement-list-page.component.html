<main class="dress-movements-list-container">
  @if (loading()) {
    <app-loading text="Loading movements..." />
  } @else {
    <app-pro-table
      [columns]="columns"
      [data]="dressMovement()"
      [sortOptions]="sortOptions"
      [pagination]="{ pageSize: pageSize(), pageNumber: pageNumber(), totalItems: totalItems() }"
      [showDirtyIndicator]="true"
      [filterForm]="filterForm"
      [titleKey]="'dressMovements.list.title'"
      [addLink]="'/dress-movements/new'"
      [addLabelKey]="'dressMovements.list.add'"
      (sortChange)="onSortChange($event)"
      (paginationChange)="onPaginationChange($event)"
      (rowClick)="onRowClick($event)"
      (editClick)="onEditClick($event)"
      (deleteClick)="deleteItem($event.id)"
      (filterApply)="onFilterChange()"
    >
      <div filters>
        <div class="filter-row">
          <app-text-input
            labelKey="dressMovements.list.filter.title"
            placeholderKey="dressMovements.list.filter.titlePlaceholder"
            [control]="dressTitleControl"
            [showDirtyIndicator]="true"
          />
          <app-text-input
            labelKey="dressMovements.list.filter.sku"
            placeholderKey="dressMovements.list.filter.skuPlaceholder"
            [control]="skuControl"
            [showDirtyIndicator]="true"
          />
          <app-text-input
            labelKey="dressMovements.list.filter.size"
            placeholderKey="dressMovements.list.filter.sizePlaceholder"
            [control]="sizeControl"
            [showDirtyIndicator]="true"
          />
          <app-text-input
            labelKey="dressMovements.list.filter.color"
            placeholderKey="dressMovements.list.filter.colorPlaceholder"
            [control]="colorControl"
            [showDirtyIndicator]="true"
          />
          <app-text-input
            labelKey="dressMovements.list.filter.minQuantity"
            placeholderKey="dressMovements.list.filter.minQuantityPlaceholder"
            [control]="minQuantityControl"
            [showDirtyIndicator]="true"
          />
          <app-text-input
            labelKey="dressMovements.list.filter.maxQuantity"
            placeholderKey="dressMovements.list.filter.maxQuantityPlaceholder"
            [control]="maxQuantityControl"
            [showDirtyIndicator]="true"
          />
        </div>
      </div>
    </app-pro-table>
  }
</main>
