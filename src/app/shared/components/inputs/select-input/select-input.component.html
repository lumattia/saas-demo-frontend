<div class="select-input-wrapper">
  @if (labelKey) {
  <label class="select-input-label">
    {{ labelKey | translate }}
    @if (required) {
      <span class="required-mark">*</span>
    }
  </label>
}
  <select
    [formControl]="control"
    [disabled]="disabled"
    class="select-input-field"
    [class.error]="errorKey"
    [class.dirty]="isDirty"
  >
    @if (placeholderKey) {
      <option value="">
        {{ placeholderKey | translate }}
      </option>
    }
    @for (option of options; track option.id) {
      <option [value]="option.id">
        {{ option.name | translate }}
      </option>
    }
  </select>
  @if (errorKey) {
    <span class="select-input-error">
      {{ errorKey | translate }}
    </span>
  }
</div>
