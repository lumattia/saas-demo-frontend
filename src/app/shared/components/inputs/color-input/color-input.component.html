<div class="color-input-wrapper">
  @if (labelKey) {
  <label class="color-input-label">
    {{ labelKey | translate }}
  </label>
}
  <div class="color-input-container">
    <input
      type="color"
      [formControl]="control"
      class="color-input-field"
      [class.invalid]="!isValid"
      [class.dirty]="isDirty"
    />
    <input
      type="text"
      [formControl]="control"
      class="color-text-field"
      [class.invalid]="!isValid"
      [class.dirty]="isDirty"
      maxlength="7"
      placeholder="#000000"
    />
  </div>
  @if (!isValid && errorKey) {
    <span class="color-input-error">
      {{ errorKey | translate }}
    </span>
  }
</div>
